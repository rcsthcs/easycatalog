services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartcatalog-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - smartcatalog

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartcatalog-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - smartcatalog

networks:
  smartcatalog:
    driver: bridge
